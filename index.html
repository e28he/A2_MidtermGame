<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Octopus Barista - A2 Midterm</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.3/lib/p5.min.js"></script>
  </head>
  <body>
    <div id="start-overlay">
      <video
        id="opening-video"
        src="Assets/Opening video.mp4"
        autoplay
        muted
        loop
        playsinline
      ></video>
      <div id="mode-select-hint" aria-live="polite">
        Select mode: <strong>Start / SPACE / ENTER = Game</strong> |
        <strong>P = Practice</strong>
      </div>
      <button id="start-button" type="button">Start</button>
    </div>
    <main id="app"></main>
    <script src="sketch.js"></script>
  </body>
</html>
